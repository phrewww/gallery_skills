<!DOCTYPE html>
<html>
<body>
<script>
  window.ai_edge_gallery_get_result = async function(data) {
    try {
      var parsed = JSON.parse(data);
      var destination = (parsed.destination || "").trim();
      var mode = (parsed.mode || "driving").trim();

      if (!destination) {
        return JSON.stringify({error: "No destination provided."});
      }

      var dirflgMap = {walking: "w", bicycling: "b", transit: "r", driving: "d"};
      var dirflg = dirflgMap[mode] || "d";

      var url = "https://maps.google.com/maps?saddr=My+Location" +
                "&daddr=" + encodeURIComponent(destination) +
                "&dirflg=" + dirflg +
                "&output=embed";

      return JSON.stringify({webview: {iframe: true, url: url}});
    } catch (e) {
      return JSON.stringify({error: "Invalid input: " + e.message});
    }
  };
</script>
</body>
</html>
