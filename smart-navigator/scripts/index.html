<!DOCTYPE html>
<html>
<body>
<script>
   window['ai_edge_gallery_get_result'] = async (data) => {
    try {
      var parsed = JSON.parse(data);
      var destination = (parsed.destination || "").trim();
      var mode = (parsed.mode || "driving").trim();

      if (!destination) {
        return JSON.stringify({error: "No destination provided."});
      }

      var dirflgMap = {driving: "d", walking: "w", bicycling: "b", transit: "r"};
      var dirflg = dirflgMap[mode] || "d";

      var url = "https://maps.google.com/?saddr=My+Location&daddr=" +
                encodeURIComponent(destination) + "&dirflg=" + dirflg;

      return JSON.stringify({status: "ok", destination: destination, mode: mode, url: url});
    } catch (e) {
      return JSON.stringify({error: "Invalid input: " + e.message});
    }
  };
</script>
</body>
</html>
