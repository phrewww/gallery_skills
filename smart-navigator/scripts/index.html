<!DOCTYPE html>
<html>
<body>
<script>
  window.ai_edge_gallery_get_result = async function(userInput) {
    var input = (userInput || "").trim();

    // --- Parse travel mode ---
    var mode = "driving";
    if (/\b(walk|walking|on foot)\b/i.test(input)) {
      mode = "walking";
    } else if (/\b(bik(e|ing)|cycl(e|ing|ist)|bicycle)\b/i.test(input)) {
      mode = "bicycling";
    } else if (/\b(train|bus|transit|public transport|metro|tram|subway|tube)\b/i.test(input)) {
      mode = "transit";
    }

    // --- Parse destination ---
    var destination = input
      .replace(/\s+by\s+(car|train|bus|bike|bicycle|foot|transit|walking|driving|cycling|metro|tram|subway|tube)\s*$/i, "")
      .trim();

    if (!destination) {
      return JSON.stringify({
        status: "error",
        error: "No destination provided. Please specify where you want to go."
      });
    }

    // --- Build Google Maps URL ---
    var url = "https://www.google.com/maps/dir/?api=1" +
              "&destination=" + encodeURIComponent(destination) +
              "&travelmode=" + encodeURIComponent(mode);

    return JSON.stringify({
      status: "ok",
      destination: destination,
      mode: mode,
      url: url
    });
  };
</script>
</body>
</html>
